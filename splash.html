<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Ouino</title>
</head>
<body>

<style>

#logo{
position: absolute;
height: 93px;
width: 366px;
background: url(common/ouino.svg);
background-size: cover;
top: 0; right: 0; bottom: 0; left: 0;
margin: auto auto;
z-index: 3;
}

#background{
position: fixed;
width: 100%;
height: 100%;
z-index: 1;
background: radial-gradient( #b91919, #8d1313);
left: 0;
top: 0;
margin: 0;
z-index: 2;
}

iframe{
position: fixed;
width: 100%;
height: 100%;
z-index:1;
border: none;
left: 0; top: 0;
margin: 0; padding: 0;
}


</style>

<div id="logo"></div>
<div id="background"></div>
<iframe src="index.html"></iframe>
<script>

setTimeout(function(){
var background = document.querySelector('#background');
background.style.display = "none";	
var logo = document.querySelector('#logo');
logo.style.display = "none";	
},2000);



</script>
</body>
</html>
